name: Daily GameJob Crawl

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install browser runtime
        run: npx puppeteer browsers install chrome

      - name: Run daily GameJob crawl
        id: daily_crawl
        continue-on-error: true
        run: npm run crawl:daily

      - name: Commit updated crawl data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/jobs data/history public/api
          if git diff --cached --quiet; then
            echo "No crawl data changes to commit."
            exit 0
          fi
          git commit -m "Daily GameJob crawl"
          git push origin HEAD:main

      - name: Notify Discord on crawl success
        if: steps.daily_crawl.outcome == 'success' && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          LATEST_APPLIED_DATE=$(node -p "JSON.parse(require('fs').readFileSync('public/api/jobs-metadata.json','utf8')).latestAppliedDate || ''")
          REFERENCE_JOB_COUNT=$(node -p "JSON.parse(require('fs').readFileSync('public/api/jobs-metadata.json','utf8')).referenceJobCount || 0")
          NEW_JOBS_COUNT=$(node -p "JSON.parse(require('fs').readFileSync('public/api/jobs-metadata.json','utf8')).newJobsCount || 0")
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\":\"[Portfolio-Coach] Daily GameJob crawl succeeded\nDate: ${LATEST_APPLIED_DATE}\nReference jobs: ${REFERENCE_JOB_COUNT}\nNew jobs: ${NEW_JOBS_COUNT}\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK_URL"

      - name: Notify Discord on crawl failure
        if: steps.daily_crawl.outcome == 'failure' && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\":\"[Portfolio-Coach] Daily GameJob crawl failed\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK_URL"

      - name: Fail workflow when crawl failed
        if: steps.daily_crawl.outcome == 'failure'
        run: exit 1
