name: Daily GameJob Crawl

on:
  schedule:
    - cron: '0 15 * * *'
    - cron: '0 18 * * *'
    - cron: '0 21 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Decide crawl run mode
        id: crawl_plan
        shell: bash
        run: |
          EVENT_NAME="${{ github.event_name }}"
          SCHEDULE_EXPR="${{ github.event.schedule }}"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "run_label=manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$SCHEDULE_EXPR" = "0 18 * * *" ] || [ "$SCHEDULE_EXPR" = "0 21 * * *" ] || [ "$SCHEDULE_EXPR" = "0 0 * * *" ]; then
            SHOULD_RUN=$(node <<'NODE'
          const fs = require('fs');
          const path = 'data/jobs/_meta.json';
          const formatKstDate = (value) => new Intl.DateTimeFormat('en-CA', {
            timeZone: 'Asia/Seoul',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
          }).format(value);

          const todayKst = formatKstDate(new Date());
          let meta = {};

          try {
            meta = JSON.parse(fs.readFileSync(path, 'utf8'));
          } catch {
            process.stdout.write('true');
            process.exit(0);
          }

          const lastSuccessKst = meta.lastSuccessfulCrawlAt
            ? formatKstDate(new Date(meta.lastSuccessfulCrawlAt))
            : '';

          if (meta.lastCrawlStatus === 'success' && lastSuccessKst === todayKst) {
            process.stdout.write('false');
          } else {
            process.stdout.write('true');
          }
          NODE
          )
            echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
            if [ "$SHOULD_RUN" = "true" ]; then
              if [ "$SCHEDULE_EXPR" = "0 18 * * *" ]; then
                echo "run_label=retry-1" >> "$GITHUB_OUTPUT"
              elif [ "$SCHEDULE_EXPR" = "0 21 * * *" ]; then
                echo "run_label=retry-2" >> "$GITHUB_OUTPUT"
              else
                echo "run_label=retry-3" >> "$GITHUB_OUTPUT"
              fi
            else
              if [ "$SCHEDULE_EXPR" = "0 18 * * *" ]; then
                echo "run_label=retry-1-skip" >> "$GITHUB_OUTPUT"
              elif [ "$SCHEDULE_EXPR" = "0 21 * * *" ]; then
                echo "run_label=retry-2-skip" >> "$GITHUB_OUTPUT"
              else
                echo "run_label=retry-3-skip" >> "$GITHUB_OUTPUT"
              fi
            fi
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "run_label=primary" >> "$GITHUB_OUTPUT"

      - name: Skip retry when daily crawl already succeeded
        if: steps.crawl_plan.outputs.should_run != 'true'
        run: echo "Retry window skipped because today's crawl already succeeded."

      - name: Install dependencies
        if: steps.crawl_plan.outputs.should_run == 'true'
        run: npm ci

      - name: Install browser runtime
        if: steps.crawl_plan.outputs.should_run == 'true'
        run: npx puppeteer browsers install chrome

      - name: Run daily GameJob crawl
        id: daily_crawl
        if: steps.crawl_plan.outputs.should_run == 'true'
        continue-on-error: true
        run: npm run crawl:daily

      - name: Commit updated crawl data
        if: steps.crawl_plan.outputs.should_run == 'true' && steps.daily_crawl.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/jobs data/history public/api
          if git diff --cached --quiet; then
            echo "No crawl data changes to commit."
            exit 0
          fi
          git commit -m "Daily GameJob crawl"
          git push origin HEAD:main

      - name: Notify Discord on crawl success
        if: steps.crawl_plan.outputs.should_run == 'true' && steps.daily_crawl.outcome == 'success'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured. Skip notification."
            exit 0
          fi

          RUN_KIND="${{ steps.crawl_plan.outputs.run_label }}"
          case "$RUN_KIND" in
            manual) RUN_KIND_LABEL="수동 실행" ;;
            primary) RUN_KIND_LABEL="정규 실행" ;;
            retry-1) RUN_KIND_LABEL="1차 재시도" ;;
            retry-2) RUN_KIND_LABEL="2차 재시도" ;;
            retry-3) RUN_KIND_LABEL="3차 재시도" ;;
            *) RUN_KIND_LABEL="$RUN_KIND" ;;
          esac
          export RUN_KIND_LABEL
          node <<'NODE' > discord-payload.json
          const fs = require('fs');

          const meta = JSON.parse(fs.readFileSync('public/api/jobs-metadata.json', 'utf8'));
          const toCount = (value) => {
            const count = Number(value);
            return Number.isFinite(count) ? count : 0;
          };
          const lines = [
            `[Portfolio-Coach] ${process.env.RUN_KIND_LABEL} 게임잡 크롤링 성공`,
            `반영일: ${meta.latestAppliedDate || ''}`,
            `기존 공고 수: ${toCount(meta.previousReferenceJobCount)}`,
            `현재 참고 공고 수: ${toCount(meta.referenceJobCount)}`,
            `신규 공고 수: ${toCount(meta.newJobsCount)}`,
            `재활성 공고 수: ${toCount(meta.reactivatedJobsCount)}`,
            `마감/삭제 공고 수: ${toCount(meta.deletedJobsCount)}`,
            `목록 감지 수: ${toCount(meta.listedJobsCount)}`,
            `상세 저장 수: ${toCount(meta.crawledJobsCount)}`,
            `상세 신규 수집 수: ${toCount(meta.fetchedJobsCount)}`,
            `기존 상세 재사용 수: ${toCount(meta.reusedJobsCount)}`,
            `크롤링 오류 수: ${toCount(meta.errorCount)}`,
            `실행 링크: https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
          ];
          process.stdout.write(JSON.stringify({ content: lines.join('\n') }));
          NODE
          curl -H "Content-Type: application/json" \
            -X POST \
            --data @discord-payload.json \
            "$DISCORD_WEBHOOK_URL"

      - name: Notify Discord on crawl failure
        if: steps.crawl_plan.outputs.should_run == 'true' && steps.daily_crawl.outcome == 'failure'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured. Skip notification."
            exit 0
          fi

          RUN_KIND="${{ steps.crawl_plan.outputs.run_label }}"
          case "$RUN_KIND" in
            manual) RUN_KIND_LABEL="수동 실행" ;;
            primary) RUN_KIND_LABEL="정규 실행" ;;
            retry-1) RUN_KIND_LABEL="1차 재시도" ;;
            retry-2) RUN_KIND_LABEL="2차 재시도" ;;
            retry-3) RUN_KIND_LABEL="3차 재시도" ;;
            *) RUN_KIND_LABEL="$RUN_KIND" ;;
          esac
          export RUN_KIND_LABEL
          node <<'NODE' > discord-payload.json
          const fs = require('fs');

          let meta = {};
          try {
            meta = JSON.parse(fs.readFileSync('public/api/jobs-metadata.json', 'utf8'));
          } catch {
            meta = {};
          }

          const toCount = (value) => {
            const count = Number(value);
            return Number.isFinite(count) ? count : 0;
          };
          const lines = [
            `[Portfolio-Coach] ${process.env.RUN_KIND_LABEL} 게임잡 크롤링 실패`,
            `사유: ${meta.lastCrawlError || '알 수 없음'}`,
            `보존된 참고 공고 수: ${toCount(meta.referenceJobCount)}`,
            `목록 감지 수: ${toCount(meta.listedJobsCount)}`,
            `상세 저장 수: ${toCount(meta.crawledJobsCount)}`,
            `상세 신규 수집 수: ${toCount(meta.fetchedJobsCount)}`,
            `기존 상세 재사용 수: ${toCount(meta.reusedJobsCount)}`,
            `크롤링 오류 수: ${toCount(meta.errorCount)}`,
            `저장소: ${process.env.GITHUB_REPOSITORY}`,
            `브랜치: ${process.env.GITHUB_REF_NAME || ''}`,
            `실행 링크: https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
          ];
          process.stdout.write(JSON.stringify({ content: lines.join('\n') }));
          NODE
          curl -H "Content-Type: application/json" \
            -X POST \
            --data @discord-payload.json \
            "$DISCORD_WEBHOOK_URL"

      - name: Fail workflow when crawl failed
        if: steps.crawl_plan.outputs.should_run == 'true' && steps.daily_crawl.outcome == 'failure'
        run: exit 1
