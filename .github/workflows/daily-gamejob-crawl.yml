name: Daily GameJob Crawl

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install browser runtime
        run: npx puppeteer browsers install chrome

      - name: Run daily GameJob crawl
        id: daily_crawl
        continue-on-error: true
        run: npm run crawl:daily

      - name: Commit updated crawl data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jobs public/api
          if git diff --cached --quiet; then
            echo "No crawl data changes to commit."
            exit 0
          fi
          git commit -m "Daily GameJob crawl"
          git push origin HEAD:main

      - name: Fail workflow when crawl failed
        if: steps.daily_crawl.outcome == 'failure'
        run: exit 1
