name: Daily GameJob Crawl

on:
  schedule:
    - cron: '0 15 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Decide crawl run mode
        id: crawl_plan
        shell: bash
        run: |
          EVENT_NAME="${{ github.event_name }}"
          SCHEDULE_EXPR="${{ github.event.schedule }}"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "run_label=manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$SCHEDULE_EXPR" = "0 17 * * *" ]; then
            SHOULD_RUN=$(node <<'NODE'
const fs = require('fs');
const path = 'data/jobs/_meta.json';
const formatKstDate = (value) => new Intl.DateTimeFormat('en-CA', {
  timeZone: 'Asia/Seoul',
  year: 'numeric',
  month: '2-digit',
  day: '2-digit',
}).format(value);

const todayKst = formatKstDate(new Date());
let meta = {};

try {
  meta = JSON.parse(fs.readFileSync(path, 'utf8'));
} catch {
  process.stdout.write('true');
  process.exit(0);
}

const lastSuccessKst = meta.lastSuccessfulCrawlAt
  ? formatKstDate(new Date(meta.lastSuccessfulCrawlAt))
  : '';

if (meta.lastCrawlStatus === 'success' && lastSuccessKst === todayKst) {
  process.stdout.write('false');
} else {
  process.stdout.write('true');
}
NODE
)
            echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
            if [ "$SHOULD_RUN" = "true" ]; then
              echo "run_label=retry" >> "$GITHUB_OUTPUT"
            else
              echo "run_label=retry-skip" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "run_label=primary" >> "$GITHUB_OUTPUT"

      - name: Skip retry when daily crawl already succeeded
        if: steps.crawl_plan.outputs.should_run != 'true'
        run: echo "Retry window skipped because today's crawl already succeeded."

      - name: Install dependencies
        if: steps.crawl_plan.outputs.should_run == 'true'
        run: npm ci

      - name: Install browser runtime
        if: steps.crawl_plan.outputs.should_run == 'true'
        run: npx puppeteer browsers install chrome

      - name: Run daily GameJob crawl
        id: daily_crawl
        if: steps.crawl_plan.outputs.should_run == 'true'
        continue-on-error: true
        run: npm run crawl:daily

      - name: Commit updated crawl data
        if: steps.crawl_plan.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/jobs data/history public/api
          if git diff --cached --quiet; then
            echo "No crawl data changes to commit."
            exit 0
          fi
          git commit -m "Daily GameJob crawl"
          git push origin HEAD:main

      - name: Notify Discord on crawl success
        if: steps.crawl_plan.outputs.should_run == 'true' && steps.daily_crawl.outcome == 'success' && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          LATEST_APPLIED_DATE=$(node -p "JSON.parse(require('fs').readFileSync('public/api/jobs-metadata.json','utf8')).latestAppliedDate || ''")
          REFERENCE_JOB_COUNT=$(node -p "JSON.parse(require('fs').readFileSync('public/api/jobs-metadata.json','utf8')).referenceJobCount || 0")
          NEW_JOBS_COUNT=$(node -p "JSON.parse(require('fs').readFileSync('public/api/jobs-metadata.json','utf8')).newJobsCount || 0")
          RUN_KIND="${{ steps.crawl_plan.outputs.run_label }}"
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\":\"[Portfolio-Coach] ${RUN_KIND} GameJob crawl succeeded\nDate: ${LATEST_APPLIED_DATE}\nReference jobs: ${REFERENCE_JOB_COUNT}\nNew jobs: ${NEW_JOBS_COUNT}\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK_URL"

      - name: Notify Discord on crawl failure
        if: steps.crawl_plan.outputs.should_run == 'true' && steps.daily_crawl.outcome == 'failure' && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          RUN_KIND="${{ steps.crawl_plan.outputs.run_label }}"
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\":\"[Portfolio-Coach] ${RUN_KIND} GameJob crawl failed\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK_URL"

      - name: Fail workflow when crawl failed
        if: steps.crawl_plan.outputs.should_run == 'true' && steps.daily_crawl.outcome == 'failure'
        run: exit 1
